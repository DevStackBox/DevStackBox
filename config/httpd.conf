# Minimal Apache Configuration for DevStackBox
ServerRoot "C:/xampp/htdocs/DevStackBox/apache"
PidFile "C:/xampp/htdocs/DevStackBox/logs/httpd.pid"
Listen 80

# Essential modules
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule cgi_module modules/mod_cgi.so
LoadModule alias_module modules/mod_alias.so
LoadModule actions_module modules/mod_actions.so
LoadModule headers_module modules/mod_headers.so
LoadModule env_module modules/mod_env.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule rewrite_module modules/mod_rewrite.so

ServerName localhost:80
DocumentRoot "C:/xampp/htdocs/DevStackBox/www"

<Directory "C:/xampp/htdocs/DevStackBox/www">
    Require all granted
    DirectoryIndex index.php index.html index.htm
    
    # Handle PHP files through CGI
    AddHandler php-script .php
    
    <Files "*.php">
        SetHandler php-script
    </Files>
</Directory>

# MIME Types
TypesConfig conf/mime.types
AddType text/html .html .htm

# PHP Configuration (CGI Mode)
ScriptAlias /php/ "C:/xampp/htdocs/DevStackBox/php/8.2/"
Action php-script /php/php-cgi.exe
AddHandler php-script .php
AddType application/x-httpd-php .php

# Directory for PHP CGI scripts
<Directory "C:/xampp/htdocs/DevStackBox/php/8.2">
    AllowOverride None
    Options ExecCGI
    Require all granted
    CGIPassAuth On
</Directory>

# Error and Access logs
ErrorLog "C:/xampp/htdocs/DevStackBox/logs/error.log"
CustomLog "C:/xampp/htdocs/DevStackBox/logs/access.log" common
LogLevel info

# Security
ServerTokens Prod
ServerSignature Off

# Disable .htaccess files completely
AccessFileName ""

# phpMyAdmin Configuration  
Alias /phpmyadmin "C:/xampp/htdocs/DevStackBox/phpmyadmin"

<Directory "C:/xampp/htdocs/DevStackBox/phpmyadmin">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    DirectoryIndex index.php
    Require all granted
    
    # Handle PHP files
    <FilesMatch "\.php$">
        SetHandler php-script
    </FilesMatch>
    
    # Allow JS, CSS, images
    <FilesMatch "\.(js|css|png|jpg|gif|svg|ico|woff|woff2|ttf|eot)$">
        Require all granted
    </FilesMatch>
</Directory>
